<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام الاستئذان الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      body {
        font-family: "Cairo", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #0f172a;
        color: #f8fafc;
        overflow-x: hidden;
      }

      .animated-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background:
          radial-gradient(
            circle at 15% 50%,
            rgba(79, 70, 229, 0.15),
            transparent 25%
          ),
          radial-gradient(
            circle at 85% 30%,
            rgba(236, 72, 153, 0.15),
            transparent 25%
          );
        animation: bgShift 15s ease-in-out infinite alternate;
      }

      @keyframes bgShift {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.1);
        }
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }

      .fade-scale-up {
        animation: fadeScaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes fadeScaleUp {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .countdown-circle {
        transition: stroke-dashoffset 0.1s linear;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }

      .class-radio:checked + div {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-color: transparent;
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      }
    </style>
  </head>
  <body class="flex flex-col items-center justify-center p-4">
    <div class="animated-bg"></div>

    <div class="w-full max-w-2xl mx-auto">
      <header
        class="text-center mb-6 fade-scale-up"
        style="animation-delay: 0.1s"
      >
        <div
          class="inline-flex items-center justify-center p-4 rounded-full bg-white/5 mb-4 border border-white/10 shadow-lg backdrop-blur-md"
        >
          <i data-lucide="fingerprint" class="w-10 h-10 text-indigo-400"></i>
        </div>
        <h1
          class="text-4xl md:text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 via-white to-purple-300 drop-shadow-sm mb-3"
        >
          بوابة الاستئذان الذكية
        </h1>
        <p class="text-slate-400 text-lg font-medium">
          نظام آلي لتنظيم الخروج لدورة المياه
        </p>

        <div
          id="offline-warning"
          class="hidden mt-4 inline-flex items-center gap-2 bg-amber-500/20 text-amber-300 px-4 py-2 rounded-xl text-sm font-bold border border-amber-500/30"
        >
          <i data-lucide="wifi-off" class="w-4 h-4"></i>
          يعمل بدون شبكة (لا توجد مزامنة بين الأجهزة)
        </div>
      </header>

      <div
        id="main-container"
        class="glass-panel rounded-3xl p-6 md:p-10 fade-scale-up relative overflow-hidden"
        style="animation-delay: 0.2s"
      >
        <div class="flex flex-col items-center justify-center py-20 text-white">
          <i
            data-lucide="loader-2"
            class="w-12 h-12 animate-spin text-indigo-400 mb-4"
          ></i>
          <p class="text-slate-400 font-bold">جاري تشغيل النظام...</p>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getDatabase,
        ref,
        set,
        onValue,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

      const MY_CUSTOM_FIREBASE_CONFIG = {
        apiKey: "AIzaSyBx8BHOmWro4zSASKTMGpUfRaNkEHcVw20",
        authDomain: "press-9e413.firebaseapp.com",
        databaseURL:
          "https://press-9e413-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "press-9e413",
        storageBucket: "press-9e413.firebasestorage.app",
        messagingSenderId: "829446280747",
        appId: "1:829446280747:web:9a4bd382baaa2e5346fc6e",
        measurementId: "G-LTLDZPEHVM",
      };

      const APP_STATE = {
        AVAILABLE: "AVAILABLE",
        WAITING: "WAITING",
        OCCUPIED: "OCCUPIED",
      };

      // 7- إنشاء معرف ثابت لكل جهاز
      let deviceId = localStorage.getItem("deviceId");
      if (!deviceId) {
        deviceId = crypto.randomUUID();
        localStorage.setItem("deviceId", deviceId);
      }

      let currentState = null;
      let activeRequest = {
        className: "",
        ownerDevice: "",
      };
      let requestTimeMs = null;
      let occupantStartTimeMs = null;
      let isOfflineMode = false;

      let app, auth, db, currentUser, dbRef;

      function initApp() {
        let configToUse = MY_CUSTOM_FIREBASE_CONFIG;

        if (configToUse) {
          try {
            app = initializeApp(configToUse);
            auth = getAuth(app);
            db = getDatabase(app);
            dbRef = ref(db, "bathroomState");

            onAuthStateChanged(auth, (user) => {
              currentUser = user;
              if (user) listenToDatabase();
            });
            signInAnonymously(auth).catch((e) => {
              console.error("Anonymous Auth:", e);
              startOfflineMode();
            });
          } catch (e) {
            console.error(e);
            startOfflineMode();
          }
        } else {
          startOfflineMode();
        }
      }

      function startOfflineMode() {
        isOfflineMode = true;
        document.getElementById("offline-warning").classList.remove("hidden");

        const savedState = JSON.parse(
          localStorage.getItem("bathroomSyncData"),
        ) || {
          state: APP_STATE.AVAILABLE,
          className: "",
          ownerDevice: "",
          requestTime: null,
          occupantStartTime: null,
        };

        updateLocalState(savedState);
      }

      function updateLocalState(data) {
        if (!data) return;
        currentState = data.state;
        activeRequest.className = data.className || "";
        activeRequest.ownerDevice = data.ownerDevice || "";
        requestTimeMs = data.requestTime || null;
        occupantStartTimeMs = data.occupantStartTime || null;
        renderUI();
      }

      function saveToDatabase(data) {
        if (isOfflineMode) {
          localStorage.setItem("bathroomSyncData", JSON.stringify(data));
          updateLocalState(data);
        } else {
          set(dbRef, data);
        }
      }

      function listenToDatabase() {
        onValue(
          dbRef,
          (snapshot) => {
            const data = snapshot.val();
            if (data) {
              updateLocalState(data);
            } else {
              saveToDatabase({
                state: APP_STATE.AVAILABLE,
                className: "",
                ownerDevice: "",
                requestTime: null,
                occupantStartTime: null,
              });
            }
          },
          (error) => {
            console.error("Firebase Error:", error);
            startOfflineMode();
          },
        );
      }

      window.handleRequest = function (e) {
        e.preventDefault();

        // 2- تعديل handleRequest للاعتماد على المجموعة فقط
        const classInput = document.querySelector(
          'input[name="class-select"]:checked',
        );

        if (classInput) {
          saveToDatabase({
            state: APP_STATE.WAITING,
            className: classInput.value,
            ownerDevice: deviceId, // حفظ معرف الجهاز بدلاً من اسم المشرف
            requestTime: Date.now(),
            occupantStartTime: null,
          });
        }
      };

      window.handleReturn = function () {
        // التحقق من أن الجهاز الذي يحاول إنهاء العملية هو نفس الجهاز الذي بدأها
        if (deviceId !== activeRequest.ownerDevice) {
          alert("لا يمكنك إنهاء هذا الاستئذان لأنه يتبع جهازاً آخر.");
          return;
        }

        saveToDatabase({
          state: APP_STATE.AVAILABLE,
          className: "",
          ownerDevice: "",
          requestTime: null,
          occupantStartTime: null,
        });
      };

      function renderUI() {
        const container = document.getElementById("main-container");
        if (currentState === APP_STATE.AVAILABLE)
          container.innerHTML = getAvailableUI();
        else if (currentState === APP_STATE.WAITING)
          container.innerHTML = getWaitingUI();
        else if (currentState === APP_STATE.OCCUPIED)
          container.innerHTML = getOccupiedUI();
        if (typeof lucide !== "undefined") lucide.createIcons();
      }

      function getAvailableUI() {
        return `
            <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl"></div>
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 font-bold text-sm mb-4">
                    <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                    دورة المياه متاحة الآن
                </div>
            </div>
            <form onsubmit="handleRequest(event)" class="space-y-8 relative z-10">
                <div class="space-y-3">
                    <label class="block text-slate-300 font-bold text-lg">المجموعة</label>
                    <div class="grid grid-cols-3 gap-3 md:gap-4">
                        <label class="cursor-pointer relative">
                            <input type="radio" name="class-select" value="الأول (أ)" required class="peer sr-only class-radio">
                            <div class="text-center p-3 md:p-4 rounded-2xl border-2 border-slate-700/50 text-slate-400 font-bold transition-all hover:bg-white/5"><span class="block text-xl mb-1">1️⃣</span> الأول (أ)</div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="class-select" value="الأول (ب)" class="peer sr-only class-radio">
                            <div class="text-center p-3 md:p-4 rounded-2xl border-2 border-slate-700/50 text-slate-400 font-bold transition-all hover:bg-white/5"><span class="block text-xl mb-1">2️⃣</span> الأول (ب)</div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="class-select" value="الأول (ج)" class="peer sr-only class-radio">
                            <div class="text-center p-3 md:p-4 rounded-2xl border-2 border-slate-700/50 text-slate-400 font-bold transition-all hover:bg-white/5"><span class="block text-xl mb-1">3️⃣</span> الأول (ج)</div>
                        </label>
                    </div>
                </div>
                <button type="submit" class="w-full bg-white text-slate-900 hover:bg-indigo-50 font-black text-xl py-4 rounded-2xl transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)] flex items-center justify-center gap-3">
                    تأكيد حجز الدورة <i data-lucide="arrow-left-circle" class="w-6 h-6"></i>
                </button>
            </form>
        `;
      }

      function getWaitingUI() {
        return `
            <div class="absolute top-0 left-0 w-full h-full bg-amber-500/5 blur-3xl rounded-full"></div>
            <div class="flex flex-col items-center justify-center py-10 relative z-10 text-center fade-scale-up">
                <h2 class="text-2xl font-bold text-white mb-2">جاري التحقق من دورة المياه...</h2>
                <p class="text-slate-400 mb-10">الرجاء الانتظار قليلاً حتى يتم التأكد من عدم وجود أشخاص بالداخل.</p>
                <div class="relative w-48 h-48 flex items-center justify-center mb-8">
                    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"></circle>
                        <circle id="countdown-ring" cx="50" cy="50" r="45" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" class="countdown-circle" stroke-dasharray="283" stroke-dashoffset="0"></circle>
                    </svg>
                    <span id="countdown-text" class="text-6xl font-black text-white absolute">10</span>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-xl p-4 w-full max-w-sm">
                    <p class="text-sm text-slate-400 mb-1">المجموعة الحالية:</p>
                    <p class="font-bold text-lg text-amber-300">${activeRequest.className}</p>
                </div>
            </div>
        `;
      }

      function getOccupiedUI() {
        const canReturn = deviceId === activeRequest.ownerDevice;

        return `
            <div class="absolute top-0 left-0 w-full h-full bg-rose-500/10 blur-3xl rounded-full"></div>
            <div class="text-center py-6 relative z-10 fade-scale-up">
                <div class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-rose-500/10 border border-rose-500/20 text-rose-400 font-bold mb-8">
                    <i data-lucide="lock" class="w-5 h-5"></i>
                    دورة المياه مشغولة حالياً
                </div>

                <div class="bg-slate-900/50 border border-white/10 rounded-3xl p-8 mb-8 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-2 h-full bg-gradient-to-b from-rose-400 to-orange-500"></div>

                    <h3 class="text-3xl font-black text-white mb-6">
                        ${activeRequest.className}
                    </h3>

                    <div class="border-t border-white/10 pt-6 mt-2">
                        <p class="text-sm text-slate-500 mb-2">
                            الوقت المنقضي بالداخل
                        </p>
                        <p id="elapsed-time-text" class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-300 to-rose-300 tabular-nums tracking-wider">
                            00:00
                        </p>
                    </div>
                </div>

                ${
                  canReturn
                    ? `
                <button onclick="handleReturn()" class="w-full bg-gradient-to-r from-rose-500 to-orange-500 hover:from-rose-600 hover:to-orange-600 text-white font-black text-xl py-4 rounded-2xl transition-all shadow-[0_4px_20px_rgba(225,29,72,0.4)] flex items-center justify-center gap-3">
                    عودة المجموعة
                    <i data-lucide="log-in" class="w-6 h-6"></i>
                </button>
                `
                    : `
                <div class="w-full bg-amber-500/20 border border-amber-500/30 text-amber-300 font-bold text-lg py-4 rounded-2xl">
                    لا يمكن إنهاء هذا الاستئذان إلا من الجهاز الذي بدأه
                </div>
                `
                }
            </div>
        `;
      }

      setInterval(() => {
        if (currentState === APP_STATE.WAITING && requestTimeMs) {
          const elapsed = Date.now() - requestTimeMs;
          const remaining = Math.max(0, 10000 - elapsed);
          const waitSeconds = Math.ceil(remaining / 1000);

          const textEl = document.getElementById("countdown-text");
          const ringEl = document.getElementById("countdown-ring");
          if (textEl && ringEl) {
            textEl.innerText = waitSeconds;
            ringEl.style.strokeDashoffset = 283 - (remaining / 10000) * 283;
          }

          if (remaining === 0) {
            saveToDatabase({
              state: APP_STATE.OCCUPIED,
              className: activeRequest.className,
              ownerDevice: activeRequest.ownerDevice,
              requestTime: requestTimeMs,
              occupantStartTime: Date.now(),
            });
          }
        } else if (currentState === APP_STATE.OCCUPIED && occupantStartTimeMs) {
          const timeEl = document.getElementById("elapsed-time-text");
          if (timeEl) {
            const diffSecs = Math.floor(
              (Date.now() - occupantStartTimeMs) / 1000,
            );
            const mins = Math.floor(diffSecs / 60);
            const secs = diffSecs % 60;
            timeEl.innerText = `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
            if (diffSecs > 180) {
              timeEl.classList.remove("from-orange-300", "to-rose-300");
              timeEl.classList.add(
                "from-red-500",
                "to-red-600",
                "animate-pulse",
              );
            }
          }
        }
      }, 100);

      initApp();
    </script>
  </body>
</html>
