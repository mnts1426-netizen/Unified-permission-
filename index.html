<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام الاستئذان الذكي</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Cairo -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      body {
        font-family: "Cairo", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #0f172a;
        color: #f8fafc;
        overflow-x: hidden;
      }

      /* خلفية متحركة وعصرية */
      .animated-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background:
          radial-gradient(
            circle at 15% 50%,
            rgba(79, 70, 229, 0.15),
            transparent 25%
          ),
          radial-gradient(
            circle at 85% 30%,
            rgba(236, 72, 153, 0.15),
            transparent 25%
          );
        animation: bgShift 15s ease-in-out infinite alternate;
      }

      @keyframes bgShift {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.1);
        }
      }

      /* تأثير الزجاج (Glassmorphism) */
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }

      /* حركات ظهور العناصر */
      .fade-scale-up {
        animation: fadeScaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes fadeScaleUp {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* الدائرة المتحركة للعد التنازلي */
      .countdown-circle {
        transition: stroke-dashoffset 0.1s linear; /* جعل الحركة أسرع للتزامن المباشر */
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }

      /* تخصيص أزرار الاختيار (Radio Buttons) */
      .class-radio:checked + div {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-color: transparent;
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      }
    </style>
  </head>
  <body class="flex flex-col items-center justify-center p-4">
    <!-- الخلفية المتحركة -->
    <div class="animated-bg"></div>

    <div class="w-full max-w-2xl mx-auto">
      <!-- الترويسة -->
      <header
        class="text-center mb-10 fade-scale-up"
        style="animation-delay: 0.1s"
      >
        <div
          class="inline-flex items-center justify-center p-4 rounded-full bg-white/5 mb-4 border border-white/10 shadow-lg backdrop-blur-md"
        >
          <i data-lucide="fingerprint" class="w-10 h-10 text-indigo-400"></i>
        </div>
        <h1
          class="text-4xl md:text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 via-white to-purple-300 drop-shadow-sm mb-3"
        >
          بوابة الاستئذان الذكية
        </h1>
        <p class="text-slate-400 text-lg font-medium">
          نظام آلي لتنظيم الخروج لدورة المياه
        </p>
      </header>

      <!-- الحاوية الرئيسية المتغيرة -->
      <div
        id="main-container"
        class="glass-panel rounded-3xl p-6 md:p-10 fade-scale-up relative overflow-hidden"
        style="animation-delay: 0.2s"
      >
        <!-- الشاشة الافتراضية أثناء تحميل الاتصال -->
        <div class="flex flex-col items-center justify-center py-20 text-white">
          <i
            data-lucide="loader-2"
            class="w-12 h-12 animate-spin text-indigo-400 mb-4"
          ></i>
          <p class="text-slate-400 font-bold">جاري المزامنة مع الخوادم...</p>
        </div>
      </div>
    </div>

    <!-- استيراد مكتبات Firebase وتهيئة المزامنة السحابية -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        signInWithCustomToken,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      let app, auth, db, appId, currentUser;

      // تهيئة قواعد البيانات السحابية (Firebase)
      try {
        const firebaseConfig =
          typeof __firebase_config !== "undefined"
            ? JSON.parse(__firebase_config)
            : {};
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        appId = typeof __app_id !== "undefined" ? __app_id : "default-app-id";
      } catch (err) {
        console.error("Firebase config error:", err);
      }

      // --- حالة النظام المتزامنة ---
      const APP_STATE = {
        AVAILABLE: "AVAILABLE",
        WAITING: "WAITING",
        OCCUPIED: "OCCUPIED",
      };

      let currentState = null; // null تعني جاري التحميل
      let activeRequest = { studentName: "", className: "" };
      let requestTimeMs = null;
      let occupantStartTimeMs = null;
      let requestedByUid = null;
      let isTransitioning = false; // لمنع تكرار الإرسال

      // ربط الدوال بنافذة المتصفح لتستدعيها أزرار HTML
      window.handleRequest = function (e) {
        e.preventDefault();
        if (!currentUser) return;

        const nameInput = document.getElementById("student-name").value.trim();
        const classInput = document.querySelector(
          'input[name="class-select"]:checked',
        );

        if (nameInput && classInput) {
          // حفظ الطلب في قاعدة البيانات السحابية ليظهر للجميع
          const docRef = doc(
            db,
            "artifacts",
            appId,
            "public",
            "data",
            "bathroomState",
            "singleton",
          );
          setDoc(docRef, {
            state: APP_STATE.WAITING,
            studentName: nameInput,
            className: classInput.value,
            requestTime: Date.now(),
            requestedByUid: currentUser.uid,
            occupantStartTime: null,
          });
        }
      };

      window.handleReturn = function () {
        if (!currentUser) return;

        // تحرير دورة المياه في السحابة لتتاح للجميع
        const docRef = doc(
          db,
          "artifacts",
          appId,
          "public",
          "data",
          "bathroomState",
          "singleton",
        );
        setDoc(docRef, {
          state: APP_STATE.AVAILABLE,
          studentName: "",
          className: "",
          requestTime: null,
          requestedByUid: null,
          occupantStartTime: null,
        });
      };

      // دالة عرض الواجهة (نفس التصميم السابق بالضبط)
      function renderUI() {
        const container = document.getElementById("main-container");

        if (currentState === null) {
          // شاشة التحميل (تمت إضافتها في الـ HTML الأساسي)
        } else if (currentState === APP_STATE.AVAILABLE) {
          container.innerHTML = getAvailableUI();
        } else if (currentState === APP_STATE.WAITING) {
          container.innerHTML = getWaitingUI();
        } else if (currentState === APP_STATE.OCCUPIED) {
          container.innerHTML = getOccupiedUI();
        }

        if (typeof lucide !== "undefined") lucide.createIcons();
      }

      function getAvailableUI() {
        return `
                <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl"></div>
                <div class="text-center mb-8">
                    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 font-bold text-sm mb-4">
                        <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                        دورة المياه متاحة الآن
                    </div>
                </div>
                <form id="request-form" onsubmit="handleRequest(event)" class="space-y-8 relative z-10">
                    <div class="space-y-3">
                        <label class="block text-slate-300 font-bold text-lg">اسم الطالب المستأذن</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
                                <i data-lucide="user" class="w-6 h-6 text-slate-400"></i>
                            </div>
                            <input type="text" id="student-name" required placeholder="اكتب الاسم هنا..." 
                                class="w-full bg-slate-900/50 border-2 border-slate-700/50 text-white rounded-2xl focus:ring-4 focus:ring-indigo-500/30 focus:border-indigo-500 block pr-12 p-4 text-lg outline-none transition-all placeholder:text-slate-600">
                        </div>
                    </div>
                    <div class="space-y-3">
                        <label class="block text-slate-300 font-bold text-lg">الفصل</label>
                        <div class="grid grid-cols-3 gap-3 md:gap-4">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="class-select" value="الفصل الأول" required class="peer sr-only class-radio">
                                <div class="text-center p-3 md:p-4 rounded-2xl border-2 border-slate-700/50 text-slate-400 font-bold transition-all hover:bg-white/5">
                                    <span class="block text-xl mb-1">1️⃣</span> الأول
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="class-select" value="الفصل الثاني" class="peer sr-only class-radio">
                                <div class="text-center p-3 md:p-4 rounded-2xl border-2 border-slate-700/50 text-slate-400 font-bold transition-all hover:bg-white/5">
                                    <span class="block text-xl mb-1">2️⃣</span> الثاني
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="class-select" value="الفصل الثالث" class="peer sr-only class-radio">
                                <div class="text-center p-3 md:p-4 rounded-2xl border-2 border-slate-700/50 text-slate-400 font-bold transition-all hover:bg-white/5">
                                    <span class="block text-xl mb-1">3️⃣</span> الثالث
                                </div>
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-white text-slate-900 hover:bg-indigo-50 font-black text-xl py-4 rounded-2xl transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:shadow-[0_0_30px_rgba(255,255,255,0.4)] flex items-center justify-center gap-3 active:scale-[0.98]">
                        طلب إذن خروج
                        <i data-lucide="arrow-left-circle" class="w-6 h-6"></i>
                    </button>
                </form>
            `;
      }

      function getWaitingUI() {
        return `
                <div class="absolute top-0 left-0 w-full h-full bg-amber-500/5 blur-3xl rounded-full"></div>
                <div class="flex flex-col items-center justify-center py-10 relative z-10 text-center fade-scale-up">
                    <h2 class="text-2xl font-bold text-white mb-2">جاري التحقق من دورة المياه...</h2>
                    <p class="text-slate-400 mb-10">الرجاء الانتظار قليلاً حتى يتم التأكد من عدم وجود أشخاص بالداخل.</p>
                    <div class="relative w-48 h-48 flex items-center justify-center mb-8">
                        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"></circle>
                            <circle id="countdown-ring" cx="50" cy="50" r="45" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" class="countdown-circle" stroke-dasharray="283" stroke-dashoffset="0"></circle>
                        </svg>
                        <span id="countdown-text" class="text-6xl font-black text-white absolute">10</span>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-xl p-4 w-full max-w-sm">
                        <p class="text-sm text-slate-400 mb-1">الطلب الحالي لـ:</p>
                        <p class="font-bold text-lg text-amber-300">${activeRequest.studentName} - <span class="text-white">${activeRequest.className}</span></p>
                    </div>
                </div>
            `;
      }

      function getOccupiedUI() {
        return `
                <div class="absolute top-0 left-0 w-full h-full bg-rose-500/10 blur-3xl rounded-full"></div>
                <div class="text-center py-6 relative z-10 fade-scale-up">
                    <div class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-rose-500/10 border border-rose-500/20 text-rose-400 font-bold mb-8 shadow-[0_0_20px_rgba(225,29,72,0.2)]">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                        دورة المياه مشغولة حالياً
                    </div>
                    <div class="bg-slate-900/50 border border-white/10 rounded-3xl p-8 mb-8 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-2 h-full bg-gradient-to-b from-rose-400 to-orange-500"></div>
                        <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/10">
                            <i data-lucide="user-check" class="w-10 h-10 text-white"></i>
                        </div>
                        <h3 class="text-3xl font-black text-white mb-2">${activeRequest.studentName}</h3>
                        <p class="text-slate-400 text-lg mb-6">${activeRequest.className}</p>
                        <div class="border-t border-white/10 pt-6 mt-2">
                            <p class="text-sm text-slate-500 mb-2">الوقت المنقضي بالداخل</p>
                            <p id="elapsed-time-text" class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-300 to-rose-300 tabular-nums tracking-wider">
                                00:00
                            </p>
                        </div>
                    </div>
                    <button onclick="handleReturn()" class="w-full bg-gradient-to-r from-rose-500 to-orange-500 hover:from-rose-600 hover:to-orange-600 text-white font-black text-xl py-4 rounded-2xl transition-all shadow-[0_4px_20px_rgba(225,29,72,0.4)] hover:shadow-[0_4px_30px_rgba(225,29,72,0.6)] flex items-center justify-center gap-3 active:scale-[0.98]">
                        تسجيل عودة الطالب
                        <i data-lucide="log-in" class="w-6 h-6"></i>
                    </button>
                </div>
            `;
      }

      // --- محرك التوقيت المركزي لتزامن العدادات لجميع المستخدمين ---
      setInterval(() => {
        if (currentState === APP_STATE.WAITING && requestTimeMs) {
          // حساب الوقت المتبقي لانتهاء الـ 10 ثواني من وقت الطلب
          const elapsed = Date.now() - requestTimeMs;
          const remaining = Math.max(0, 10000 - elapsed);
          const waitSeconds = Math.ceil(remaining / 1000);

          const textEl = document.getElementById("countdown-text");
          const ringEl = document.getElementById("countdown-ring");
          if (textEl && ringEl) {
            textEl.innerText = waitSeconds;
            const circumference = 2 * Math.PI * 45;
            const offset = circumference - (remaining / 10000) * circumference;
            ringEl.style.strokeDashoffset = offset;
          }

          // عند انتهاء العداد، المستخدم الذي طلب الإذن هو من يغير الحالة لتجنب التكرار
          if (
            remaining === 0 &&
            requestedByUid === currentUser?.uid &&
            !isTransitioning
          ) {
            isTransitioning = true;
            const docRef = doc(
              db,
              "artifacts",
              appId,
              "public",
              "data",
              "bathroomState",
              "singleton",
            );
            setDoc(docRef, {
              state: APP_STATE.OCCUPIED,
              studentName: activeRequest.studentName,
              className: activeRequest.className,
              requestTime: requestTimeMs,
              requestedByUid: requestedByUid,
              occupantStartTime: Date.now(),
            })
              .then(() => {
                isTransitioning = false;
              })
              .catch(() => {
                isTransitioning = false;
              });
          }
        } else if (currentState === APP_STATE.OCCUPIED && occupantStartTimeMs) {
          // حساب وعرض الوقت المنقضي أثناء انشغال دورة المياه لجميع المستخدمين
          const timeEl = document.getElementById("elapsed-time-text");
          if (timeEl) {
            const diffSecs = Math.floor(
              (Date.now() - occupantStartTimeMs) / 1000,
            );
            const mins = Math.floor(diffSecs / 60);
            const secs = diffSecs % 60;
            timeEl.innerText = `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;

            if (diffSecs > 180) {
              // تنبيه بصري أحمر بعد مرور 3 دقائق
              timeEl.classList.remove("from-orange-300", "to-rose-300");
              timeEl.classList.add(
                "from-red-500",
                "to-red-600",
                "animate-pulse",
              );
            }
          }
        }
      }, 100);

      // --- تهيئة تسجيل الدخول والمستمع اللحظي (Real-time Listener) ---
      const initAuth = async () => {
        if (!auth) return;
        if (
          typeof __initial_auth_token !== "undefined" &&
          __initial_auth_token
        ) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      };

      if (auth) {
        onAuthStateChanged(auth, (user) => {
          currentUser = user;
          if (user) {
            const docRef = doc(
              db,
              "artifacts",
              appId,
              "public",
              "data",
              "bathroomState",
              "singleton",
            );

            // هذا المستمع يراقب أي تغيير يحدث من أي مستخدم في أي جهاز
            onSnapshot(
              docRef,
              (docSnap) => {
                if (docSnap.exists()) {
                  const data = docSnap.data();
                  const prevState = currentState;

                  // تحديث المتغيرات بناءً على السحابة
                  currentState = data.state;
                  activeRequest.studentName = data.studentName;
                  activeRequest.className = data.className;
                  requestTimeMs = data.requestTime;
                  occupantStartTimeMs = data.occupantStartTime;
                  requestedByUid = data.requestedByUid;

                  // إعادة رسم الشاشة إذا تغيرت الحالة
                  if (prevState !== currentState) {
                    renderUI();
                  }
                } else {
                  // إنشاء المستند لأول مرة
                  setDoc(docRef, {
                    state: APP_STATE.AVAILABLE,
                    studentName: "",
                    className: "",
                    requestTime: null,
                    requestedByUid: null,
                    occupantStartTime: null,
                  });
                }
              },
              (err) => {
                console.error("Snapshot error:", err);
              },
            );
          }
        });
        initAuth();
      }
    </script>
  </body>
</html>
